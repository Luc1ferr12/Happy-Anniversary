<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: url('bg.jpg') no-repeat center center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
  font-family: Arial;
  transform: scale(1);
}

/* BOX */
.container {
  max-width: 500px;
  opacity: 0;
  transform: translateY(40px) scale(0.95);
  transition: all 0.8s ease;
}

/* MASUK */
.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* KELUAR */
.hide {
  opacity: 0;
  transform: translateY(-40px) scale(0.95);
}

/* TEXT */
h1 { 
  font-size: 50px; 
  margin-bottom: 10px;
}

p { 
  margin: 20px 0; 
  opacity: 0.9;
}

/* BUTTON */
button {
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  margin: 10px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s ease;
}

/* YES */
.yes { 
  background: white; 
  color: red; 
}

.yes:hover {
  transform: scale(1.1);
}

/* NO */
.no { 
  background: transparent; 
  border: 2px solid white; 
  color: white; 
  position: relative;
}

</style>
</head>

<body>

<div class="container" id="box">
  <h1>HI, LOVE! ❤️</h1>
  <p>Do you want to see a little surprise?</p>

  <button class="yes" onclick="go()">YES</button>
  <button class="no" id="noBtn">NO</button>
</div>

<script>
const box = document.getElementById("box");

// ANIMASI MASUK PAS LOAD
window.onload = () => {
  setTimeout(() => {
    box.classList.add("show");
  }, 200);
};

// ANIMASI KELUAR
function go() {
  box.classList.remove("show");
  box.classList.add("hide");

  setTimeout(() => {
    window.location.href = "home.html";
  }, 600);
}

// NO BUTTON KABUR
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * 500 - 500;
  const y = Math.random() * 500 - 500;

  noBtn.style.transform = `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>

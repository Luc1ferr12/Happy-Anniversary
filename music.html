<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Song 🎵</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: url('bg.jpg') no-repeat center center/cover;
  font-family: 'Patrick Hand', cursive;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* CONTAINER */
.container {
  text-align: center;
  width: 100%;
  max-width: 900px;
}

/* TITLE */
.title {
  font-size: 70px;
  margin-bottom: 30px;
  letter-spacing: 5px;
  text-shadow: 2px 2px 0px #000;

  opacity: 0;
  transform: translateY(-40px);
  transition: all 1s ease;
}

.title.show {
  opacity: 1;
  transform: translateY(0);
}

/* VIDEO */
video {
  width: 100%;
  max-width: 800px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(255,255,255,0.2);

  opacity: 0;
  transform: scale(0.8);
  transition: all 1s ease;
}

video.show {
  opacity: 1;
  transform: scale(1);
}

/* BACK BUTTON */
.back {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translate(-50%, 20px);

  padding: 12px 30px;
  border-radius: 30px;
  border: 2px solid white;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(6px);

  color: white;
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;

  cursor: pointer;
  transition: all 0.3s ease;

  opacity: 0;
}

.back.show {
  opacity: 1;
  transform: translate(-50%, 0);
}

/* hover */
.back:hover {
  background: white;
  color: #8b0000;
  transform: translate(-50%, 0) scale(1.08);
}
</style>
</head>

<body>

<div class="container">

  <div class="title" id="title">❤️My Love❤️</div>

  <video id="video" controls autoplay loop>
    <source src="lagu.mp4" type="video/mp4">
  </video>

  <button class="back" id="back" onclick="goBack()">⬅ Back</button>

</div>

<script>
function goBack() {
  window.location.href = "home.html";
}

window.onload = () => {
  const title = document.getElementById("title");
  const video = document.getElementById("video");
  const back = document.getElementById("back");

  // title muncul dulu
  setTimeout(() => {
    title.classList.add("show");
  }, 200);

  // video muncul
  setTimeout(() => {
    video.classList.add("show");
  }, 900);

  // tombol terakhir
  setTimeout(() => {
    back.classList.add("show");
  }, 1600);
};
</script>

</body>
</html>
